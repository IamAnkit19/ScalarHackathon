name: email-triage-env
version: "1.0.0"
description: >
  OpenEnv environment where AI agents learn to classify and triage emails
  across three difficulty levels using LLM-powered classification.

tags:
  - email-triage
  - nlp
  - classification
  - real-world
  - openenv

tasks:
  - id: easy
    name: "Basic Email Classification"
    difficulty: easy
    max_steps: 5
    reward_range: [0.01, 0.99]
    success_threshold: 0.70

  - id: medium
    name: "Email Classification with Reasoning"
    difficulty: medium
    max_steps: 5
    reward_range: [0.01, 0.99]
    success_threshold: 0.60

  - id: hard
    name: "Full Email Triage"
    difficulty: hard
    max_steps: 5
    reward_range: [0.01, 0.99]
    success_threshold: 0.50

observation_space:
  type: object
  fields:
    id: integer
    sender: string
    subject: string
    body: string

action_space:
  type: object
  fields:
    label: "spam | work | personal (easy/medium)"
    category: "spam | work | personal (hard)"
    priority: "low | medium | high (hard)"
    action: "ignore | reply | escalate (hard)"

reward_space:
  type: float
  range: [0.01, 0.99]
  description: "Partial credit based on classification accuracy"

endpoints:
  reset: "/reset"
  step:  "/step"
  state: "/state"

server:
  port: 7860
  framework: flask
